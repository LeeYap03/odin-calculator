<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div id="calc-container">
      <div id="display">
        <div id="display-top"></div>
        <div id="display-bottom" onclick="copyToClipboard()">
          <span id="display-answer">0</span
          ><span id="copy-tooltip">Click to Copy</span>
        </div>
      </div>
      <div id="button-grid">
        <div class="button-container">
          <button id="btn-del" class="calc-button">Del</button>
        </div>
        <div class="button-container">
          <button id="btn-clr" class="calc-button">C</button>
        </div>
        <div class="button-container">
          <button id="btn-perc" class="calc-button">%</button>
        </div>
        <div class="button-container">
          <button id="btn-div" class="calc-button"></button>
        </div>
        <div class="button-container">
          <button id="btn-7" class="calc-button">7</button>
        </div>
        <div class="button-container">
          <button id="btn-8" class="calc-button">8</button>
        </div>
        <div class="button-container">
          <button id="btn-9" class="calc-button">9</button>
        </div>
        <div class="button-container">
          <button id="btn-mult" class="calc-button"></button>
        </div>
        <div class="button-container">
          <button id="btn-4" class="calc-button">4</button>
        </div>
        <div class="button-container">
          <button id="btn-5" class="calc-button">5</button>
        </div>
        <div class="button-container">
          <button id="btn-6" class="calc-button">6</button>
        </div>
        <div class="button-container">
          <button id="btn-subt" class="calc-button"></button>
        </div>
        <div class="button-container">
          <button id="btn-1" class="calc-button">1</button>
        </div>
        <div class="button-container">
          <button id="btn-2" class="calc-button">2</button>
        </div>
        <div class="button-container">
          <button id="btn-3" class="calc-button">3</button>
        </div>
        <div class="button-container">
          <button id="btn-add" class="calc-button"></button>
        </div>
        <div class="button-container">
          <button id="btn-0" class="calc-button">0</button>
        </div>
        <div class="button-container">
          <button id="btn-dcml" class="calc-button">.</button>
        </div>
        <div class="button-container">
          <button id="btn-pwr" class="calc-button">x<sup>y</sup></button>
        </div>
        <div class="button-container">
          <button id="btn-eql" class="calc-button">=</button>
        </div>
      </div>
    </div>
  </body>
</html>
